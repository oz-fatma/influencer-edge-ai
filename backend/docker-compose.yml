version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: influencer-edge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: influencer_edge_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: influencer-edge-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: